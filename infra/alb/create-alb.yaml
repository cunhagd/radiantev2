# CloudFormation: ALB para backend Radiante na EC2
# Proporciona HTTPS para resolver Mixed Content
#
# Como usar no Console AWS:
#   1. Acesse CloudFormation → Create stack → Upload this template
#   2. Preencha os parâmetros:
#      - InstanceId: i-0df8ba5134b0e0b28
#      - InstancePort: 80
#   3. Avance e crie a stack
#
# Saída: ALBDnsName (DNS do ALB, ex: radiante-alb-123456.us-east-1.elb.amazonaws.com)

AWSTemplateFormatVersion: "2010-09-09"
Description: "Radiante v2 - ALB com HTTPS para backend na EC2"

Parameters:
  InstanceId:
    Type: AWS::EC2::Instance::Id
    Description: "ID da instancia EC2 (i-0df8ba5134b0e0b28)"
    Default: i-0df8ba5134b0e0b28

  InstancePort:
    Type: Number
    Description: "Porta do backend na EC2 (nginx na porta 80)"
    Default: 80

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: "VPC ID onde a EC2 esta rodando"

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: "Subnets publicas para o ALB (min 2)"

Resources:
  # Security Group do ALB
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "SG do ALB Radiante - permite HTTPS e HTTP"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: "HTTPS da internet"
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: "HTTP redirecionamento"

  # Application Load Balancer
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: radiante-alb
      Scheme: internet-facing
      Type: application
      IpAddressType: ipv4
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets: !Ref SubnetIds
      Tags:
        - Key: Name
          Value: radiante-alb

  # Target Group para a EC2
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: radiante-tg
      Port: !Ref InstancePort
      Protocol: HTTP
      TargetType: instance
      VpcId: !Ref VpcId
      HealthCheckEnabled: true
      HealthCheckPath: /api/status
      HealthCheckPort: traffic-port
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 3
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200,202"
      Tags:
        - Key: Name
          Value: radiante-tg

  # Registrar EC2 no Target Group
  TargetGroupAttachment:
    Type: AWS::ElasticLoadBalancingV2::TargetGroupAttachment
    Properties:
      TargetGroupArn: !Ref TargetGroup
      TargetId: !Ref InstanceId
      Port: !Ref InstancePort

  # Listener HTTP (redireciona para HTTPS)
  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            Host: "#{host}"
            Path: "/#{path}"
            Query: "#{query}"
            StatusCode: HTTP_301

  # Listener HTTPS (certificado padrao do CloudFront usado pelo ACM)
  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref SSLCertificate
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # Certificado SSL via ACM
  SSLCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Sub "${ApplicationLoadBalancer.DNSName}"
      DomainValidationOptions:
        - DomainName: !Sub "${ApplicationLoadBalancer.DNSName}"
          ValidationDomain: !Sub "${ApplicationLoadBalancer.DNSName}"
      ValidationMethod: DNS
      Tags:
        - Key: Name
          Value: radiante-ssl

Outputs:
  ALBDnsName:
    Description: "DNS do ALB para usar como API_BASE"
    Value: !GetAtt ApplicationLoadBalancer.DNSName

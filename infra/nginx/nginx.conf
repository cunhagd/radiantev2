# infra/nginx/nginx.conf
# Nginx: frontend estatico + proxy reverso para backend Python
# Radiante v2 - Producao (Single EC2 com HTTPS)
#
# Certificados SSL esperados em:
#   /etc/letsencrypt/live/radiante.emaster.info/fullchain.pem
#   /etc/letsencrypt/live/radiante.emaster.info/privkey.pem

upstream backend {
    server localhost:8000;
    keepalive 32;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name radiante.emaster.info;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name radiante.emaster.info;

    ssl_certificate /etc/letsencrypt/live/radiante.emaster.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/radiante.emaster.info/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/radiante.emaster.info/chain.pem;

    # SSL recomendado
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Root para arquivos estaticos do frontend
    root /usr/share/nginx/html;
    index index.html;

    # Cache de assets estaticos (1 ano)
    location ~* \.(css|js|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        try_files $uri =404;
    }

    # Servir index.html na raiz
    location = / {
        try_files /index.html =404;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # API: proxy reverso para backend Python
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;

        # Buffer
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
    }

    # Dados (PDF, relatorios)
    location /data/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Negado: arquivos ocultos
    location ~ /\. {
        deny all;
        return 404;
    }

    # Fallback: 404
    error_page 404 /index.html;
}

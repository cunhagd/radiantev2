# ============================================================
# deploy.yml — Pipeline CI/CD Radiante v2
#
# Estrategia:
#   - CI: testes (pytest + vitest) em cada push
#   - CD: build Docker → push ECR → deploy EC2 via SSM
#   - Autenticacao: OIDC (sem chaves estaticas AWS)
#   - Deploy: AWS SSM SendCommand (sem SSH)
#   - Rollback: mantem a imagem anterior no ECR com tag :previous
#
# Gatilhos:
#   - Push na branch main (full pipeline: test + build + deploy)
#   - Pull Request (so testes)
#   - Workflow dispatch manual (com opcao de forcar rebuild)
#
# Secrets necessarios no GitHub:
#   AWS_ROLE_ARN              — ARN do IAM Role OIDC (ex: arn:aws:iam::123456789012:role/github-actions-radiante)
#   AWS_REGION                — Regiao AWS (ex: us-east-1)
#   ECR_REPOSITORY_BACKEND    — Nome do repositório ECR para backend
#   ECR_REPOSITORY_NGINX      — Nome do repositório ECR para frontend/nginx
#   EC2_INSTANCE_ID           — ID da instancia EC2 alvo (ex: i-0123456789abcdef0)
#
# Variaveis do ambiente (GitHub Environments):
#   AWS_ACCOUNT_ID            — ID da conta AWS
#   APP_DIR                   — Diretorio da app no EC2 (ex: /opt/radiante)
# ============================================================

name: CI/CD - Radiante v2

on:
  push:
    branches: [main]
    paths-ignore:
      - 'specs/**'
      - '**.md'
      - '.specify/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'specs/**'
      - '**.md'
      - '.specify/**'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Forcar rebuild completo (sem cache)'
        type: boolean
        default: false
      skip_tests:
        description: 'Pular testes'
        type: boolean
        default: false

# =========== Environments ===========
env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  BACKEND_IMAGE: ${{ secrets.ECR_REPOSITORY_BACKEND }}
  NGINX_IMAGE: ${{ secrets.ECR_REPOSITORY_NGINX }}
  IMAGE_TAG: ${{ github.sha }}
  IMAGE_TAG_LATEST: latest
  DOCKER_BUILDKIT: 1

# =========== Permissions (OIDC) ===========
permissions:
  id-token: write
  contents: read
  attestations: write

# =========== Jobs ===========
jobs:

  # --------------------------------------------------
  # JOB 1: Testes Backend (pytest)
  # --------------------------------------------------
  test-backend:
    name: "Testes Backend"
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Rodar testes
        run: |
          python -m pytest backend/tests/ -v --tb=short --cov=backend --cov-report=term --cov-fail-under=70
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
          AWS_BEARER_TOKEN_BEDROCK: test-token

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-backend
          path: .pytest_cache/
          retention-days: 7

  # --------------------------------------------------
  # JOB 2: Testes Frontend (vitest)
  # --------------------------------------------------
  test-frontend:
    name: "Testes Frontend"
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Rodar testes
        run: npx vitest run --reporter=verbose

  # --------------------------------------------------
  # JOB 3: Build e Push Docker (ECR)
  # --------------------------------------------------
  build-and-push:
    name: "Build & Push ECR"
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (success() || inputs.skip_tests)
    outputs:
      backend_tag: ${{ steps.build-backend.outputs.image }}
      nginx_tag: ${{ steps.build-nginx.outputs.image }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- OIDC: Assume IAM Role ----------
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 1800

      # ---------- Login ECR ----------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ---------- Build Backend ----------
      - name: Build & Push Backend
        id: build-backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          CACHE_FROM: ${{ inputs.force_rebuild && '' || format('{0}/{1}:{2}', steps.login-ecr.outputs.registry, env.BACKEND_IMAGE, env.IMAGE_TAG_LATEST) }}
        run: |
          docker build \
            --file backend/Dockerfile \
            --tag $ECR_REGISTRY/$BACKEND_IMAGE:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$BACKEND_IMAGE:$IMAGE_TAG_LATEST \
            --cache-from $CACHE_FROM \
            --target runtime \
            .

          docker push --all-tags $ECR_REGISTRY/$BACKEND_IMAGE
          echo "image=$ECR_REGISTRY/$BACKEND_IMAGE:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ---------- Attestation Backend ----------
      - name: Attest Backend Image
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_IMAGE }}
          subject-digest: ${{ steps.build-backend.outputs.digest }}
          push-to-registry: true

      # ---------- Build Frontend (nginx) ----------
      - name: Build & Push Nginx
        id: build-nginx
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            --file infra/nginx/Dockerfile \
            --tag $ECR_REGISTRY/$NGINX_IMAGE:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$NGINX_IMAGE:$IMAGE_TAG_LATEST \
            .

          docker push --all-tags $ECR_REGISTRY/$NGINX_IMAGE
          echo "image=$ECR_REGISTRY/$NGINX_IMAGE:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ---------- Attestation Nginx ----------
      - name: Attest Nginx Image
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ steps.login-ecr.outputs.registry }}/${{ env.NGINX_IMAGE }}
          subject-digest: ${{ steps.build-nginx.outputs.digest }}
          push-to-registry: true

      # ---------- Tag anterior como :previous ----------
      - name: Tag Previous Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # Pega a tag atual do latest e marca como previous
          MANIFEST=$(aws ecr batch-get-image \
            --repository-name $BACKEND_IMAGE \
            --image-ids imageTag=$IMAGE_TAG_LATEST \
            --query 'images[0].imageManifest' \
            --output text 2>/dev/null || echo "")

          if [ -n "$MANIFEST" ] && [ "$MANIFEST" != "None" ]; then
            docker pull $ECR_REGISTRY/$BACKEND_IMAGE:$IMAGE_TAG_LATEST
            docker tag $ECR_REGISTRY/$BACKEND_IMAGE:$IMAGE_TAG_LATEST $ECR_REGISTRY/$BACKEND_IMAGE:previous
            docker push $ECR_REGISTRY/$BACKEND_IMAGE:previous
          fi

  # --------------------------------------------------
  # JOB 4: Deploy no EC2 via SSM
  # --------------------------------------------------
  deploy:
    name: "Deploy EC2 (SSM)"
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      # ---------- OIDC: Assume IAM Role ----------
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 900

      # ---------- Deploy via SSM ----------
      - name: Deploy via AWS SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.ecr_registry }}
        run: |
          # Monta o comando SSM com as variaveis interpoladas
          SSM_COMMAND="
            set -euo pipefail

            APP_DIR=\"/opt/radiante\"
            AWS_REGION=\"${AWS_REGION}\"
            ECR_REGISTRY=\"${ECR_REGISTRY}\"

            cd \"\$APP_DIR\"

            echo \"[DEPLOY] Autenticando ECR...\"
            aws ecr get-login-password --region \"\$AWS_REGION\" | \
              docker login --username AWS --password-stdin \"\$ECR_REGISTRY\"

            echo \"[DEPLOY] Pull da nova imagem...\"
            docker compose pull

            echo \"[DEPLOY] Subindo containers...\"
            docker compose up -d --remove-orphans

            echo \"[DEPLOY] Health check...\"
            for i in \$(seq 1 15); do
              if curl -sf http://localhost:80/health > /dev/null 2>&1; then
                echo \"[DEPLOY] App saudavel apos \$((i * 2))s\"
                break
              fi
              if [ \$i -eq 15 ]; then
                echo \"[DEPLOY] Health check FALHOU — acionando rollback...\"
                docker compose pull
                docker compose up -d --remove-orphans
                exit 1
              fi
              sleep 2
            done

            echo \"[DEPLOY] Limpando imagens antigas...\"
            docker image prune -f --filter \"until=24h\"

            echo \"[DEPLOY] Concluido com sucesso!\"
          "

          # Executa o comando no EC2 via SSM
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="$SSM_COMMAND" \
            --timeout-seconds 300 \
            --output text \
            --query "Command.CommandId")

          echo "SSM Command ID: $COMMAND_ID"
          sleep 10

          # Polling de status
          for i in $(seq 1 30); do
            STATUS=$(aws ssm list-command-invocations \
              --command-id "$COMMAND_ID" \
              --details \
              --query "CommandInvocations[0].Status" \
              --output text)

            echo "Status: $STATUS (${i}/30)"

            if [ "$STATUS" = "Success" ]; then
              echo "[DEPLOY] Deploy concluido com sucesso!"
              exit 0
            fi

            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "[DEPLOY] ERRO: Deploy falhou com status $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi

            sleep 10
          done

          echo "[DEPLOY] Timeout aguardando conclusao"
          exit 1
